{% extends "base.html" %}
{% block title %}ログイン{% endblock %}

{% block main_class %}{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="login-logo">
        <i class="bi bi-file-text-fill"></i>
      </div>
      <h1 class="h4 fw-bold mt-3">受領書管理システム</h1>
      <p class="text-muted small">YTK</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small">
      <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" autocomplete="on">
      <div class="mb-3">
        <label class="form-label fw-semibold">店舗ID</label>
        <input type="text" name="login_id" class="form-control form-control-lg"
               placeholder="店舗IDを入力" autocomplete="username" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">パスワード</label>
        <input type="password" name="password" class="form-control form-control-lg"
               placeholder="パスワードを入力" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">
        <i class="bi bi-box-arrow-in-right me-2"></i>ログイン
      </button>
    </form>
  </div>
</div>
{% endblock %}
