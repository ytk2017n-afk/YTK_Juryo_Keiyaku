<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>{% block title %}受領書管理{% endblock %} | YTK</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/css/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  {% if store %}
  <nav class="navbar navbar-dark bg-primary px-3">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-file-text-fill me-1"></i> 受領書管理
    </span>
    <div class="d-flex align-items-center gap-3">
      <span class="text-white small">{{ store.store_name }}</span>
      {% if store.is_admin %}
        <a href="/admin" class="btn btn-sm btn-light">ダッシュボード</a>
        <a href="/admin/receipts" class="btn btn-sm btn-outline-light">受領書</a>
        <a href="/admin/contracts" class="btn btn-sm btn-outline-light">契約書</a>
        <a href="/admin/stores" class="btn btn-sm btn-outline-light">店舗管理</a>
      {% else %}
        <a href="/receipt" class="btn btn-sm btn-light">受領書</a>
        <a href="/contract" class="btn btn-sm btn-outline-light">契約書</a>
      {% endif %}
      <a href="/logout" class="btn btn-sm btn-outline-light">ログアウト</a>
    </div>
  </nav>
  {% endif %}

  <main class="{% block main_class %}container py-4{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
